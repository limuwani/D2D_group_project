<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D2D | Track</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>Active Orders</h1>
            <p class="subtitle">Real-time delivery intelligence.</p>
        </div>
        
        <div id="customer-orders-container">
            <!-- Orders will load here -->
        </div>

        <nav class="nav-bar">
            <a href="restaurants.html" class="nav-link">
                <div class="nav-icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></div>
                <span>EXPLORE</span>
            </a>
            <a href="orders.html" class="nav-link active">
                <div class="nav-icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg></div>
                <span>TRACK</span>
            </a>
            <a href="customer_profile.html" class="nav-link">
                <div class="nav-icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
                <span>PROFILE</span>
            </a>
        </nav>

    </div>

    <script>
        const statusFlow = ['PENDING', 'READY', 'COLLECTED'];

        function loadCustomerOrders() {
            const container = document.getElementById('customer-orders-container');
            const allOrders = JSON.parse(localStorage.getItem('d2d_orders') || '[]');
            
            // Show pending, ready, OR collected but not yet dismissed
            const activeOrders = allOrders.filter(order => !order.dismissed);

            if (activeOrders.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; margin-top: 100px; padding: 0 40px;">
                        <div style="width: 100px; height: 100px; background: rgba(255,255,255,0.03); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px auto;">
                            <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="var(--text-dim)" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4zM3 6h18M16 10a4 4 0 0 1-8 0"/></svg>
                        </div>
                        <h2 style="font-weight: 800; font-size: 20px; letter-spacing: -0.5px; margin-bottom: 8px;">Your tray is empty</h2>
                        <p style="color: var(--text-dim); font-size: 14px; line-height: 1.6; margin-bottom: 40px;">There are no live orders to track right now. Start a new experience from the explore page.</p>
                        <a href="restaurants.html" class="btn btn-primary" style="display: inline-flex; width: auto; padding: 18px 36px;">BROWSE RESTAURANTS</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = activeOrders.map(order => {
                const progress = ((statusFlow.indexOf(order.status) + 1) / statusFlow.length) * 100;
                const restaurantName = order.restaurant || 'Unknown Restaurant';
                const isCollected = order.status === 'COLLECTED';
                
                return `
                    <div class="card" style="${isCollected ? 'border-color: var(--success); background: rgba(43, 166, 64, 0.05);' : ''}">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;">
                            <div>
                                <div style="font-size: 11px; color: var(--text-dim); letter-spacing: 2px; font-weight: 700;">#${order.id}</div>
                                <div style="font-weight: 800; font-size: 22px; margin-top: 4px; letter-spacing: -0.5px; color: #fff;">${restaurantName}</div>
                            </div>
                            <div class="badge badge-${order.status.toLowerCase()}">
                                ${order.status}
                            </div>
                        </div>

                        ${!isCollected ? `
                        <div class="progress-container">
                            <div class="progress-bar" style="width: ${progress}%"></div>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-top: 12px;">
                            <span style="font-size: 11px; color: var(--text-dim); font-weight: 600;">STATUS: ${order.status}</span>
                            <span style="font-size: 11px; color: var(--text-dim); font-weight: 600;">EST. 15 MIN</span>
                        </div>
                        ` : `
                        <div style="padding: 12px; background: rgba(43, 166, 64, 0.1); border-radius: 12px; margin-top: 12px; border: 1px solid rgba(43, 166, 64, 0.2);">
                            <p style="font-size: 12px; color: var(--success); font-weight: 700; text-align: center;">ORDER SUCCESSFULLY COLLECTED</p>
                        </div>
                        `}

                        ${isCollected ? `
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 24px;">
                                <a href="feedback.html?id=${order.id}&res=${encodeURIComponent(restaurantName)}" class="btn btn-primary" style="padding: 16px; font-size: 13px;">RATE SERVICE</a>
                                <button onclick="dismissOrder('${order.id}')" class="btn btn-outline" style="border-color: var(--success); color: var(--success); padding: 14px; font-size: 13px;">DISMISS</button>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        function dismissOrder(orderId) {
            const allOrders = JSON.parse(localStorage.getItem('d2d_orders') || '[]');
            const updatedOrders = allOrders.map(order => {
                if (String(order.id) === String(orderId)) {
                    return { ...order, dismissed: true };
                }
                return order;
            });
            localStorage.setItem('d2d_orders', JSON.stringify(updatedOrders));
            loadCustomerOrders();
        }

        loadCustomerOrders();
    </script>
</body>
</html>
