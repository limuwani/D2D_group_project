<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D2D | My Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="header" style="text-align: center;">
            <div style="width: 100px; height: 100px; background: var(--surface); border: 2px solid var(--border); border-radius: 50%; margin: 0 auto 24px auto; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;">
                <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="white" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <h1>Account Hub</h1>
            <p class="subtitle" id="user-email-display">customer@intelligence.com</p>
        </div>

        <div class="label" style="margin-top: 40px;">Management Intelligence</div>
        
        <div class="card" style="padding: 0; overflow: hidden;">
            <a href="orders.html" class="list-item" style="margin-bottom: 0; border: none; border-radius: 0; background: transparent;">
                <div style="width: 40px; height: 40px; border-radius: 12px; background: rgba(62, 166, 255, 0.1); display: flex; align-items: center; justify-content: center;">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#3EA6FF" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
                </div>
                <div style="flex-grow: 1;">
                    <div style="font-weight: 700; color: #fff;">Order History</div>
                    <div style="font-size: 12px; color: var(--text-dim);">Review your fulfillment legacy</div>
                </div>
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="var(--text-dim)" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
            </a>
            <div style="height: 1px; background: var(--border); margin: 0 20px;"></div>
            <div onclick="logout()" class="list-item" style="margin-bottom: 0; border: none; border-radius: 0; background: transparent; cursor: pointer;">
                <div style="width: 40px; height: 40px; border-radius: 12px; background: rgba(255, 255, 255, 0.05); display: flex; align-items: center; justify-content: center;">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#fff" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                </div>
                <div style="flex-grow: 1;">
                    <div style="font-weight: 700; color: #fff;">Logout</div>
                    <div style="font-size: 12px; color: var(--text-dim);">Terminate current session</div>
                </div>
            </div>
            <div style="height: 1px; background: var(--border); margin: 0 20px;"></div>
            <div onclick="deleteAccount()" class="list-item" style="margin-bottom: 0; border: none; border-radius: 0; background: transparent; cursor: pointer;">
                <div style="width: 40px; height: 40px; border-radius: 12px; background: rgba(255, 0, 0, 0.1); display: flex; align-items: center; justify-content: center;">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="var(--danger)" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6"/></svg>
                </div>
                <div style="flex-grow: 1;">
                    <div style="font-weight: 700; color: var(--danger);">Delete Account</div>
                    <div style="font-size: 12px; color: var(--text-dim);">Permanently wipe intelligence profile</div>
                </div>
            </div>
        </div>

        <nav class="nav-bar">
            <a href="restaurants.html" class="nav-link">
                <div class="nav-icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></div>
                <span>EXPLORE</span>
            </a>
            <a href="orders.html" class="nav-link">
                <div class="nav-icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg></div>
                <span>TRACK</span>
            </a>
            <a href="customer_profile.html" class="nav-link active">
                <div class="nav-icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
                <span>PROFILE</span>
            </a>
        </nav>
    </div>

    <script>
        function logout() {
            if (confirm('Terminate session?')) {
                window.location.href = 'index.html';
            }
        }

        function deleteAccount() {
            if (confirm('CRITICAL: Permanently delete your account and all order history? This cannot be undone.')) {
                localStorage.clear();
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
