<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D2D | Secure Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>Secure Your Account</h1>
            <p class="subtitle">Complete this one-time setup to enable password recovery.</p>
        </div>

        <div class="card" style="padding: 32px;">
            <div class="input-wrapper">
                <span class="label">Choose a Security Question</span>
                <select style="width: 100%; background: #1a1a1a; border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; color: white; font-size: 15px; outline: none; appearance: none; cursor: pointer;">
                    <option>What was the name of your first pet?</option>
                    <option>What is your mother's maiden name?</option>
                    <option>What was the name of your primary school?</option>
                    <option>In what city were you born?</option>
                </select>
            </div>

            <div class="input-wrapper" style="margin-top: 24px;">
                <span class="label">Your Secret Answer</span>
                <input type="text" placeholder="Type your answer here...">
                <p style="font-size: 11px; color: var(--text-dim); margin-top: 10px; line-height: 1.4;">Make sure this is something only you know. You will need this to reset your password.</p>
            </div>
            
            <a href="restaurants.html" class="btn btn-primary" style="margin-top: 12px;">COMPLETE SETUP</a>
        </div>
        
        <div style="margin-top: 30px; text-align: center; opacity: 0.5;">
            <p style="font-size: 12px; color: var(--text-dim);">Step 2 of 2: Profile Security</p>
        </div>
    </div>
</body>
</html>
